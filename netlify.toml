[build]
  publish = "dist"
  command = "node scripts/prepare-netlify-env.mjs && npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"
  VITE_API_URL = "https://stockflowbackend-production-cb53.up.railway.app"

# SPA fallback: rutas desconocidas → index.html (necesario para React Router)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
