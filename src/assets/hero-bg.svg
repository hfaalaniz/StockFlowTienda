<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="15%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#CCFF00"/>
      <stop offset="100%" stop-color="#CCFF0000"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="100%" stop-color="#00E5A000"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#AAFF00"/>
      <stop offset="100%" stop-color="#AAFF0000"/>
    </radialGradient>
    <radialGradient id="cardGrad" cx="30%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00000022"/>
    </filter>
    <filter id="shadowCard">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Base — lighter, less yellow -->
  <rect width="1440" height="600" fill="#F0FFF4"/>

  <!-- Blobs — dominant green/teal, minimal yellow -->
  <ellipse cx="180" cy="220" rx="520" ry="420" fill="url(#g1)" filter="url(#blur2)" opacity="0.55"/>
  <ellipse cx="1260" cy="400" rx="500" ry="400" fill="url(#g2)" filter="url(#blur2)" opacity="0.85"/>
  <ellipse cx="720" cy="80" rx="420" ry="280" fill="url(#g3)" filter="url(#blur1)" opacity="0.65"/>

  <!-- Diagonal lines — green tones -->
  <line x1="0" y1="600" x2="280" y2="0" stroke="#AAFF00" stroke-width="1.2" opacity="0.15"/>
  <line x1="80" y1="600" x2="360" y2="0" stroke="#00E5A0" stroke-width="1" opacity="0.1"/>
  <line x1="1440" y1="0" x2="1140" y2="600" stroke="#00E5A0" stroke-width="1.2" opacity="0.18"/>
  <line x1="1360" y1="0" x2="1060" y2="600" stroke="#AAFF00" stroke-width="1" opacity="0.1"/>

  <!-- Dot grid -->
  <g opacity="0.18" fill="#2a2a2a">
    <circle cx="580" cy="60" r="2.5"/><circle cx="620" cy="60" r="2.5"/><circle cx="660" cy="60" r="2.5"/><circle cx="700" cy="60" r="2.5"/><circle cx="740" cy="60" r="2.5"/>
    <circle cx="580" cy="100" r="2.5"/><circle cx="620" cy="100" r="2.5"/><circle cx="660" cy="100" r="2.5"/><circle cx="700" cy="100" r="2.5"/><circle cx="740" cy="100" r="2.5"/>
    <circle cx="580" cy="140" r="2.5"/><circle cx="620" cy="140" r="2.5"/><circle cx="660" cy="140" r="2.5"/><circle cx="700" cy="140" r="2.5"/><circle cx="740" cy="140" r="2.5"/>
  </g>

  <!-- Geometric accents — green/teal only -->
  <circle cx="1340" cy="90" r="160" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.25"/>
  <circle cx="1340" cy="90" r="100" fill="none" stroke="#AAFF00" stroke-width="1.5" opacity="0.2"/>
  <circle cx="90" cy="520" r="70" fill="none" stroke="#00E5A0" stroke-width="2" opacity="0.25"/>
  <rect x="320" y="470" width="50" height="50" rx="12" fill="#AAFF00" opacity="0.15" transform="rotate(-18 345 495)"/>
  <rect x="1060" y="460" width="65" height="65" rx="14" fill="#00E5A0" opacity="0.18" transform="rotate(22 1092 492)"/>
  <circle cx="950" cy="530" r="30" fill="#00E5A0" opacity="0.22"/>

  <!-- Top accent line — green -->
  <rect x="0" y="0" width="1440" height="3" fill="#AAFF00" opacity="0.6"/>

  <!-- Subtle connecting arc -->
  <path d="M295 240 Q720 160 1095 240" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="6 8" opacity="0.06"/>

  <!-- ============================================ -->
  <!-- SHOPPING CART — left                        -->
  <!-- ============================================ -->
  <g transform="translate(100, 120)" filter="url(#shadow)">
    <rect x="0" y="0" width="185" height="175" rx="28" fill="white" opacity="0.85"/>

    <path d="M28 42 L36 42 Q42 42 45 50 L62 110 Q65 118 73 118 L148 118 Q156 118 158 110 L172 64 Q174 56 166 56 L50 56"
          fill="none" stroke="#1a1a1a" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M73 118 L148 118 Q156 118 158 110 L172 64 L50 64 L62 110 Q65 118 73 118Z"
          fill="#AAFF00" opacity="0.88"/>
    <line x1="88" y1="80" x2="148" y2="80" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <line x1="84" y1="96" x2="144" y2="96" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <circle cx="88" cy="136" r="11" fill="#1a1a1a"/>
    <circle cx="88" cy="136" r="5.5" fill="white"/>
    <circle cx="142" cy="136" r="11" fill="#1a1a1a"/>
    <circle cx="142" cy="136" r="5.5" fill="white"/>
    <circle cx="168" cy="50" r="13" fill="#00E5A0"/>
    <line x1="162" y1="50" x2="174" y2="50" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="168" y1="44" x2="168" y2="56" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

    <text x="92" y="164" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#1a1a1a" opacity="0.7">Mi Carrito</text>
  </g>

  <!-- ============================================ -->
  <!-- DIGITAL WALLET — right                      -->
  <!-- ============================================ -->
  <g transform="translate(1088, 108)" filter="url(#shadowCard)">
    <rect x="0" y="0" width="225" height="138" rx="18" fill="url(#cardGrad)"/>
    <circle cx="185" cy="18" r="75" fill="#00E5A0" opacity="0.15"/>
    <circle cx="205" cy="85" r="55" fill="#AAFF00" opacity="0.08"/>
    <rect x="22" y="40" width="38" height="30" rx="6" fill="#AAFF00" opacity="0.88"/>
    <line x1="22" y1="55" x2="60" y2="55" stroke="#44880050" stroke-width="1.5"/>
    <line x1="41" y1="40" x2="41" y2="70" stroke="#44880050" stroke-width="1.5"/>
    <g fill="white" opacity="0.45">
      <circle cx="22" cy="98" r="3"/><circle cx="31" cy="98" r="3"/><circle cx="40" cy="98" r="3"/><circle cx="49" cy="98" r="3"/>
      <circle cx="65" cy="98" r="3"/><circle cx="74" cy="98" r="3"/><circle cx="83" cy="98" r="3"/><circle cx="92" cy="98" r="3"/>
      <circle cx="108" cy="98" r="3"/><circle cx="117" cy="98" r="3"/><circle cx="126" cy="98" r="3"/><circle cx="135" cy="98" r="3"/>
    </g>
    <text x="150" y="102" font-family="'Courier New', monospace" font-size="13" fill="white" opacity="0.9" font-weight="bold">4821</text>
    <text x="22" y="126" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="white" opacity="0.65" font-weight="600" letter-spacing="1.5">STOCKFLOW PAY</text>
    <g transform="translate(192, 20)" fill="none" stroke="white" stroke-linecap="round" opacity="0.55">
      <path d="M0 9 Q5 4.5 5 0 Q5 4.5 10 9" stroke-width="2"/>
      <path d="M-4 14 Q5 5 5 0 Q5 5 14 14" stroke-width="1.8"/>
      <path d="M-8 19 Q5 6 5 0 Q5 6 18 19" stroke-width="1.5"/>
    </g>

    <rect x="-8" y="120" width="240" height="80" rx="18" fill="white" opacity="0.88"/>
    <rect x="10" y="134" width="32" height="22" rx="5" fill="none" stroke="#1a1a1a" stroke-width="2.2" opacity="0.6"/>
    <rect x="24" y="130" width="18" height="8" rx="3" fill="#AAFF00" opacity="0.9"/>
    <circle cx="26" cy="145" r="4" fill="#00E5A0" opacity="0.85"/>
    <text x="130" y="148" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#888" font-weight="500">Saldo disponible</text>
    <text x="130" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="21" fill="#1a1a1a" font-weight="800">$ 12.500</text>
    <rect x="50" y="175" width="55" height="18" rx="9" fill="#AAFF00" opacity="0.75"/>
    <text x="77" y="187" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#1a1a1a" font-weight="700">Enviar</text>
    <rect x="115" y="175" width="55" height="18" rx="9" fill="#00E5A0" opacity="0.75"/>
    <text x="142" y="187" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#1a1a1a" font-weight="700">Recibir</text>
  </g>

</svg>